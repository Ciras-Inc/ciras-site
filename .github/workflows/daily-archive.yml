name: Daily Archive Expired Articles

on:
  schedule:
    - cron: '0 15 * * *'  # UTC 15:00 = JST 00:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Upgrade npm to v11.10.0+
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Archive expired articles
        run: node scripts/archive-expired.js

      - name: Commit archived changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/index.json blog/ index.html blog/index.html
          if git diff --cached --quiet; then
            echo "アーカイブ対象なし。コミットをスキップします。"
          else
            git commit -m "chore(ci): archive expired articles [skip ci]"
            git push
          fi
